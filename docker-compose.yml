# LaunchHub production stack (Coolify-friendly)
#
# Coolify builds this compose via its Docker Compose build pack. It handles:
#   - Domain routing + SSL (Let's Encrypt) — configured in the Coolify UI
#   - Volume persistence across redeploys
#   - Environment variables (set as secrets in the Coolify UI)
#
# 3rd-party credentials (Chatwoot, Mautic, Meta) are NOT here — they live in
# the database (`*_instances` tables), managed via the `/instances` UI.

services:
  launchhub:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER:-launchhub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-launchhub}
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_USER: ${ADMIN_USER:-lucas}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
    expose:
      - '3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  launchhub-workers:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ['node', 'dist/workers/index.js']
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER:-launchhub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-launchhub}
      REDIS_URL: redis://redis:6379
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      # SESSION_SECRET unused by workers but required by config.ts validation
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-launchhub}
      POSTGRES_USER: ${POSTGRES_USER:-launchhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-launchhub}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
